<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Vaal Radiology Intranet</title>
  
  <style>
    :root {
      --primary-blue: #2c5282;
      --secondary-gold: #ecc94b;
      --hover-gold: #d69e2e;
      --text-dark: #2d3748;
      --bg-light: #f7fafc;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      /* Modern Gradient overlay + Background */
      background: linear-gradient(rgba(44, 82, 130, 0.8), rgba(44, 82, 130, 0.4)), 
                  url('https://images.unsplash.com/photo-1516549655169-df83a0774514?auto=format&fit=crop&q=80&w=2070') no-repeat center center fixed;
      background-size: cover;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      padding: 3rem;
      border-radius: 20px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      text-align: center;
      border-top: 5px solid var(--primary-blue);
    }

    .logo {
      width: 120px;
      margin-bottom: 1.5rem;
    }

    h1 {
      color: var(--primary-blue);
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    p.subtitle {
      color: #718096;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }

    .form-group {
      text-align: left;
      margin-bottom: 1.25rem;
    }

    input {
      width: 100%;
      padding: 12px 16px;
      box-sizing: border-box;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: #fdfdfd;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-blue);
      box-shadow: 0 0 0 3px rgba(44, 82, 130, 0.2);
    }

    button {
      width: 100%;
      background-color: var(--secondary-gold);
      color: var(--primary-blue);
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    button:hover {
      background-color: var(--hover-gold);
      transform: translateY(-1px);
    }

    .reset-link {
      margin-top: 1.5rem;
      display: inline-block;
      color: var(--primary-blue);
      text-decoration: none;
      font-size: 0.85rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .reset-link:hover {
      text-decoration: underline;
      opacity: 0.8;
    }

    /* Loading state */
    button:disabled {
      background-color: #cbd5e0;
      cursor: not-allowed;
    }
  </style>
</head>

<body>

  <div class="login-card">
    <img class="logo" src="logo.png" alt="Vaal Radiology Logo">
    <h1>Vaal Radiology</h1>
    <p class="subtitle">Secure Intranet Access</p>

    <form id="loginForm">
      <div class="form-group">
        <input type="email" id="email" placeholder="Email Address" required>
      </div>
      <div class="form-group">
        <input type="password" id="password" placeholder="Password" required>
      </div>
      <button type="submit" id="loginBtn">Log In</button>
    </form>

    <a href="#" id="resetPasswordLink" class="reset-link">Forgot your password?</a>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { 
      getAuth, 
      signInWithEmailAndPassword, 
      sendPasswordResetEmail 
    } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBtEdayVkFQ_Ug2S0eFkJktC81HESeUpBE",
      authDomain: "login-intranet-fb821.firebaseapp.com",
      projectId: "login-intranet-fb821",
      storageBucket: "login-intranet-fb821.appspot.com",
      messagingSenderId: "721373194464",
      appId: "1:721373194464:web:fc20d062aab1314ac38885",
      measurementId: "G-G55NCPT2CY"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginBtn = document.getElementById("loginBtn");

    document.getElementById("loginForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      loginBtn.disabled = true;
      loginBtn.innerText = "Authenticating...";

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        await signInWithEmailAndPassword(auth, email, password);
        await addDoc(collection(db, "loginLogs"), {
          email, status: "Success", type: "Login", timestamp: new Date()
        });
        window.location.href = "https://sites.google.com/view/vaal-radiology/home";
      } catch (error) {
        await addDoc(collection(db, "loginLogs"), {
          email, status: "Failed: " + error.message, type: "Login", timestamp: new Date()
        });
        alert("Login failed: " + error.message);
        loginBtn.disabled = false;
        loginBtn.innerText = "Log In";
      }
    });

    document.getElementById("resetPasswordLink").addEventListener("click", async function(e) {
      e.preventDefault();
      const email = document.getElementById("email").value;

      if (!email) {
        alert("Please enter your email address in the field first.");
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        await addDoc(collection(db, "loginLogs"), {
          email, status: "Password reset email sent", type: "PasswordReset", timestamp: new Date()
        });
        alert("✅ Password reset email sent! Check your inbox.");
      } catch (error) {
        alert("❌ Error: " + error.message);
      }
    });
  </script>
</body>
</html>
